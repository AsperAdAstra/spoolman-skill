name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: spoolman-cli/src/go.mod

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ZIPs
        run: task pack VERSION=${{ github.ref_name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            out/spoolman-${{ github.ref_name }}-darwin-arm64.zip \
            out/spoolman-${{ github.ref_name }}-darwin-amd64.zip \
            out/spoolman-${{ github.ref_name }}-linux-amd64.zip \
            out/spoolman-${{ github.ref_name }}-windows-amd64.zip
